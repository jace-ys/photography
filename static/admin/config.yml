---
site_url: https://jaceystan.com
publish_mode: editorial_workflow
media_folder: static/images
public_folder: /images

backend:
  name: git-gateway
  squash_merges: true

local_backend: true

editor:
  preview: false

media_library:
  name: cloudinary
  config:
    cloud_name: jaceystan
    api_key: 634315473442474

collections:
  - label: "Hugo"
    name: "hugo"
    format: "toml"
    files:
      - label: "Configuration"
        name: "configuration"
        file: "config.toml"
        fields:
          - { label: "URL", name: "baseURL", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - label: "Params"
            name: "params"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }
              - label: "Social"
                name: "social"
                widget: "list"
                collapsed: false
                allow_add: true
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Href", name: "href", widget: "string" }
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Ionicon", name: "ionicon", widget: "string" }

  - label: "Sections"
    name: "sections"
    format: "toml-frontmatter"
    preview_path: "{{slug}}"
    files:
      - label: "Home"
        name: "home"
        file: "content/stills/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Headline", name: "headline", widget: "string" }
          - label: "Typed"
            name: "typed"
            widget: "list"
            collapsed: false
            allow_add: true
            field: { label: "Title", name: "title", widget: "string" }

      - label: "Portfolio"
        name: "portfolio"
        file: "content/portfolio/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

      - label: "Videos"
        name: "videos"
        file: "content/videos/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

      - label: "Blog"
        name: "blog"
        file: "content/blog/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

      - label: "About"
        name: "about"
        file: "content/about/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Image", name: "image", widget: "image", choose_url: false }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "content/contact/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Location", name: "location", widget: "string" }

      - label: "Gear"
        name: "gear"
        file: "content/gear/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Categories"
            name: "categories"
            widget: "list"
            collapsed: false
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Note", name: "note", widget: "string", required: false }

  - label: "Stills"
    name: "stills"
    format: "toml-frontmatter"
    folder: "content/stills"
    preview_path: "stills/{{slug}}"
    filter: { field: "collection", value: true }
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", time_format: false, picker_utc: true }
      - { label: "Cover Image", name: "cover", widget: "image", choose_url: false }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "Place name used for the destinations map. Defaults to the album title if blank." }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Collection", name: "collection", widget: "hidden", default: true }
      - label: "Images"
        name: "images"
        widget: "list"
        collapsed: false
        fields:
          - { label: "Image", name: "src", widget: "image", choose_url: false }
          - { label: "Orientation", name: "orientation", widget: "select", options: ["portrait", "landscape"], default: "landscape" }
          - { label: "Caption", name: "caption", widget: "string", required: false }

  - label: "Videos"
    name: "videos"
    format: "toml-frontmatter"
    folder: "content/videos"
    preview_path: "videos"
    filter: { field: "collection", value: true }
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", time_format: false, picker_utc: true }
      - { label: "Collection", name: "collection", widget: "hidden", default: true }
      - { label: "Body", name: "body", widget: "markdown" }

  - label: "Portfolio"
    name: "portfolio"
    format: "toml-frontmatter"
    folder: "content/portfolio"
    preview_path: "portfolio/{{slug}}"
    filter: { field: "collection", value: true }
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", time_format: false, picker_utc: true }
      - { label: "Cover Image", name: "cover", widget: "image", choose_url: false }
      - { label: "Collection", name: "collection", widget: "hidden", default: true }
      - label: "Images"
        name: "images"
        widget: "list"
        collapsed: false
        fields:
          - { label: "Image", name: "src", widget: "image", choose_url: false }
          - { label: "Orientation", name: "orientation", widget: "select", options: ["portrait", "landscape"], default: "landscape" }
          - { label: "Caption", name: "caption", widget: "string", required: false }

  - label: "Blog"
    name: "blog"
    format: "toml-frontmatter"
    folder: "content/blog"
    preview_path: "blog/{{slug}}"
    filter: { field: "collection", value: true }
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", time_format: false, picker_utc: true }
      - { label: "Cover Image", name: "cover", widget: "image", choose_url: false }
      - label: "Metadata"
        name: "metadata"
        widget: "object"
        fields:
          - { label: "Author", name: "author", widget: "string", default: "Jace Tan" }
      - { label: "Collection", name: "collection", widget: "hidden", default: true }
      - label: "Images"
        name: "images"
        widget: "list"
        collapsed: false
        fields:
          - { label: "Image", name: "src", widget: "image", choose_url: false }
          - { label: "Orientation", name: "orientation", widget: "select", options: ["portrait", "landscape"], default: "landscape" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
