<header class="header" id="site-header">
  <div class="header-logo">
    <a href="/" class="header-wordmark">Jaceys.</a>
  </div>
  <ul class="header-main-nav--desktop">
    {{- $current := . }}
    {{- range .Site.Menus.nav }}
    {{ $active := or ($current.IsMenuCurrent "nav" .) (eq $current.Section (lower .Name)) }}
    <li class="{{ if $active }}active{{ end }}">
      <a href="{{ .URL }}">{{ .Name }}</a>
    </li>
    {{- end }}
  </ul>
  <a class="header-menu-toggle" href="#"><span>Menu</span></a>
</header>
